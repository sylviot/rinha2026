name: rinha2026

x-api: &api
  build:
    context: .
    dockerfile: Dockerfile
  networks: [ app ]
  volumes:
    - ./data:/input:ro
    - refs:/refs
    - sock:/run/sock
  depends_on: []
  # Common DOTNET tuning is set per-service below (YAML override replaces, doesn't merge).

services:
  api1:
    <<: *api
    hostname: api1
    environment:
      # Workstation GC (CPU-constrained); ConserveMemory=1 keeps GC pauses small for p99.
      DOTNET_gcServer: "0"
      DOTNET_GCConserveMemory: "1"
      DOTNET_GCHeapHardLimitPercent: "70"
      DOTNET_TieredCompilation: "0"
      LISTEN_SOCK: /run/sock/api-1.sock
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "170MB"

  api2:
    <<: *api
    hostname: api2
    environment:
      DOTNET_gcServer: "0"
      DOTNET_GCConserveMemory: "1"
      DOTNET_GCHeapHardLimitPercent: "70"
      DOTNET_TieredCompilation: "0"
      LISTEN_SOCK: /run/sock/api-2.sock
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: "170MB"

  lb:
    image: nginx:1.27-alpine
    hostname: lb
    networks: [ app ]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - sock:/run/sock
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    # nginx is the proxy AND the work scheduler — needs enough CPU to not queue under load.
    # Was 0.05 → 100% saturated at 900 RPS, dominated the p99 tail.
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: "10MB"

volumes:
  refs:
  sock:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=4m,mode=0777"

networks:
  app:
    driver: bridge
