name: rinha2026

x-api: &api
  image: sylviot/rinha2026:v3
  platform: linux/amd64
  networks: [ app ]
  volumes:
    - ./resources:/input:ro
    - refs:/refs
  expose:
    - "8080"
  depends_on: []
  environment:
    DOTNET_gcServer: "0"
    DOTNET_GCConserveMemory: "9"
    DOTNET_GCHeapHardLimitPercent: "50"

services:
  api1:
    <<: *api
    hostname: api1
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "170MB"

  api2:
    <<: *api
    hostname: api2
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "170MB"

  lb:
    image: nginx:1.27-alpine
    platform: linux/amd64
    hostname: lb
    networks: [ app ]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "10MB"

volumes:
  refs:

networks:
  app:
    driver: bridge