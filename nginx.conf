worker_processes 1;
events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    access_log off;
    error_log /dev/stderr warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 100000;

    upstream fraud_api {
        server api1:8080 max_fails=0 fail_timeout=1s;
        server api2:8080 max_fails=0 fail_timeout=1s;
        keepalive 64;
    }

    server {
        listen 9999 default_server;

        location / {
            proxy_pass http://fraud_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_buffering off;

            # Retry the other upstream on connect errors (avoids 502 if one
            # instance restarts or is briefly busy).
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 5s;

            proxy_connect_timeout 2s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }
    }
}
